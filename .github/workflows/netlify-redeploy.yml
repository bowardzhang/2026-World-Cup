name: Trigger Netlify redeploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  trigger-netlify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify build hook
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK_URL" ]; then
            echo "Missing repository secret: NETLIFY_BUILD_HOOK_URL"
            exit 1
          fi

          echo "Triggering Netlify redeploy..."
          curl -fsS -X POST "$NETLIFY_BUILD_HOOK_URL"
          echo "Netlify redeploy trigger sent."
